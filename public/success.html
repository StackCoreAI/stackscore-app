<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>StackScore — Credit Route Activated</title>
  <link rel="stylesheet" href="/assets/app.css?v=boot3" />
</head>
<body class="min-h-screen bg-black text-white flex items-center justify-center p-8">
  <div class="max-w-lg w-full rounded-2xl border border-white/10 bg-white/5 p-8 shadow-xl shadow-lime-500/10">
    
    <h1 class="text-2xl font-semibold mb-3">
  Credit Route Activated ✅
</h1>

<p class="text-white/80 mb-6">
  Your personalized Credit Route is now unlocked and ready.
</p>

    <div id="status" class="text-white/70 text-sm mb-6">
      Verifying payment…
    </div>

    <button id="go" class="px-4 py-2 rounded-xl bg-lime-500 text-black font-semibold hidden">
      Continue to your Credit Route
    </button>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const sessionId = params.get("session_id");

  const statusEl = document.getElementById("status");
  const goBtn = document.getElementById("go");

  async function getSessionDetails() {
    const res = await fetch(
      `/.netlify/functions/get-checkout-session?session_id=${encodeURIComponent(sessionId)}`
    );
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error || "Unable to read Stripe session.");
    return data;
  }

  function showContinue(stackKey) {
    goBtn.classList.remove("hidden");
    goBtn.onclick = () => {
      location.href = `/guides/82.html?stackKey=${encodeURIComponent(stackKey)}&paid=1`;
    };
  }

  async function run() {
    try {
      if (!sessionId) {
        statusEl.textContent = "Missing session ID. Please return to checkout.";
        return;
      }

      const sessionData = await getSessionDetails();

      const paid = !!sessionData.paid;
      const email = (sessionData.email || "").trim();
      const stackKey = String(sessionData.stackKey || "growth").toLowerCase();

      if (!paid) {
        statusEl.textContent = "Payment is still processing. Please refresh in a moment.";
        goBtn.textContent = "Refresh";
        goBtn.classList.remove("hidden");
        goBtn.onclick = () => location.reload();
        return;
      }

      // ✅ Always store paid flag (even if email missing)
      localStorage.setItem("stackscore_paid", "1");
      if (email) {
        localStorage.setItem("stackscore_paid_email", email);
      }

      statusEl.textContent = "Activated. Redirecting…";

      // 🔐 Redirect attempt
      const target = `/guides/82.html?stackKey=${encodeURIComponent(stackKey)}&paid=1`;

      // Fallback button if redirect fails
      showContinue(stackKey);

      // Attempt automatic redirect
      setTimeout(() => {
        location.href = target;
      }, 600);

      // Safety fallback (if redirect blocked for any reason)
      setTimeout(() => {
        statusEl.textContent = "If you're not redirected automatically, click below.";
        showContinue(stackKey);
      }, 2500);

    } catch (e) {
      console.error(e);
      statusEl.textContent = "Error verifying payment. Please refresh.";
      goBtn.textContent = "Refresh";
      goBtn.classList.remove("hidden");
      goBtn.onclick = () => location.reload();
    }
  }

  run();
</script>

</body>
</html>
