# netlify.toml (repo root)

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai", "@sparticuz/chromium", "puppeteer-core"]

# -----------------------------
# Function timeouts
# -----------------------------
[functions."stripe-webhook"]
  timeout = 20

[functions."create-checkout-session"]
  timeout = 20

[functions."get-checkout-session"]
  timeout = 20

[functions."preview-copy"]
  timeout = 20

[functions."export-plan-pdf"]
  timeout = 26
  included_files = ["pdf/templates/creditroute-guide.html"]

# --------------------------------
# Disable caching for guide pages
# --------------------------------
[[headers]]
  for = "/guides/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Pragma = "no-cache"


# -----------------------------
# Redirects (order matters)
# -----------------------------

# Guide deep links
[[redirects]]
  from = "/guide/:id"
  to   = "/guides/:id.html"
  status = 200
  force = true

# Stripe success page (static HTML)
[[redirects]]
  from = "/success"
  to   = "/success.html"
  status = 200
  force = true

# Allow direct access to success.html
[[redirects]]
  from = "/success.html"
  to   = "/success.html"
  status = 200

# -----------------------------
# Assets pass-through (CRITICAL FIX)
# Prevent SPA fallback from hijacking JS/CSS requests
# -----------------------------
[[redirects]]
  from = "/assets/*"
  to   = "/assets/:splat"
  status = 200

# -----------------------------
# SPA fallback — MUST BE LAST
# -----------------------------
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
